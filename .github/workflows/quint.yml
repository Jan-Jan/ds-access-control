name: quint
on: [push, pull_request]
jobs:
  quint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: "20" }
      - run: npm i -g @informalsystems/quint
      - run: quint typecheck quint/membership.qnt
      - run: quint typecheck quint/membership_mbt.qnt
      - run: quint test quint/membership.qnt
      - run: quint run quint/membership_mbt.qnt --invariant=mbtInv --max-steps=15 --max-samples=200
      - run: quint typecheck quint/protocol.qnt
      - run: quint typecheck quint/ods_instances.qnt
      - run: quint run quint/protocol.qnt --invariant=forkSafety --max-steps=16 --max-samples=5000
      - run: quint run quint/protocol.qnt --invariant=revocationSafety --max-steps=16 --max-samples=5000
      - run: quint run quint/protocol.qnt --invariant=revokedExcludedFromOrgSecret --max-steps=16 --max-samples=5000
  apalache:
    runs-on: ubuntu-latest
    continue-on-error: true   # bounded verify is best-effort (slow, JVM-heavy)
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: "20" }
      - uses: actions/setup-java@v4
        with: { distribution: "temurin", java-version: "17" }
      - run: npm i -g @informalsystems/quint
      # Abstract-root representation (roots are int tokens + a rootMembers table,
      # not Snapshot maps) makes bounded verify tractable to depth ~5-6 (the
      # concrete-Snapshot model topped out at depth 2). Depth 5 verifies in ~8s
      # per invariant; the simulator covers greater breadth. See the abstract-root
      # remodel design spec.
      - run: quint verify quint/protocol.qnt --invariant=forkSafety --max-steps=5
      - run: quint verify quint/protocol.qnt --invariant=revocationSafety --max-steps=5
      - run: quint verify quint/protocol.qnt --invariant=revokedExcludedFromOrgSecret --max-steps=5
  mbt:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: "20" }
      - run: npm i -g @informalsystems/quint
      - uses: dtolnay/rust-toolchain@stable
      - run: cd org-members && cargo test --test mbt_conformance
