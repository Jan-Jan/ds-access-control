[profile.default]
src             = "src"
test            = "test"
out             = "out"
libs            = ["lib"]
solc_version    = "0.8.27"
optimizer       = true
optimizer_runs  = 200
evm_version     = "cancun"
verbosity       = 2
fuzz            = { runs = 256 }

[fmt]
line_length     = 100
tab_width       = 4
bracket_spacing = false
